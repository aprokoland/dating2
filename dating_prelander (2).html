<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCH DETECTED!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#ec4899', 600: '#db2777' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #000; margin: 0; padding: 0; }
        
        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.65);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans">

    <video autoplay loop muted playsinline class="video-bg" id="bg-video">
        <source src="" type="video/mp4" id="video-source">
    </video>

    <!-- Main UI Card -->
    <div class="glass-panel w-full max-w-md rounded-3xl p-8 text-center relative z-10">
        <div class="mx-auto w-16 h-16 bg-brand-50 rounded-full flex items-center justify-center mb-6 relative">
            <div class="absolute inset-0 rounded-full bg-brand-500 opacity-20 animate-ping"></div>
            <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
        </div>

        <h1 class="text-3xl font-extrabold text-gray-900 mb-4">MATCH DETECTED!</h1>
        <p class="text-gray-600 mb-8">There are currently active members within 5 miles looking for quick meetups. Do you want to see who is online?</p>

        <button onclick="handlePrimaryAction()" class="w-full bg-brand-600 text-white font-bold py-4 rounded-2xl hover:bg-brand-700 transition shadow-lg">
            Continue & View Profiles
        </button>
        
        <button onclick="window.location.href='https://google.com'" class="mt-4 w-full text-gray-400 font-medium hover:text-gray-700">
            Exit
        </button>
    </div>

    <script>
        // List of video URLs to rotate between
        const videos = [
            "https://giveaway.recipesmara.com/wp-content/uploads/2026/07/From-Klickpin.com-From-beginner-to-obsessed-Recreate-these-beautiful-road-trip-ideas-that-help-you-get-the-look-without-the-stress-with-aesthetic.mp4",
            "https://giveaway.recipesmara.com/wp-content/uploads/2026/07/From-Klickpin.com-Beginner-Friendly-Money-Saving-Tips-You-Need-Right-Now-pin-id-832180837433758481.mp4"
        ];

        function handlePrimaryAction() {
            // Placeholder for your actual tracking link
            window.location.href = "#"; 
        }
        
        // Ensure video plays and select a random one
        window.addEventListener('load', () => {
            const video = document.getElementById('bg-video');
            const source = document.getElementById('video-source');
            
            // Pick a random video
            const randomVideo = videos[Math.floor(Math.random() * videos.length)];
            source.src = randomVideo;
            
            // Reload and play
            video.load();
            video.play().catch(() => console.log("Autoplay blocked"));
        });
    </script>
</body>
</html>
