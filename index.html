    <script type="text/javascript">
        // Language detection logic
        window.onload = function() {
            var userLang = navigator.language || navigator.userLanguage;
            var textElement = document.getElementById("loading-text");

            if (userLang.includes('pt')) {
                textElement.innerHTML = "Por favor, aguarde...";
            } else if (userLang.includes('fr')) {
                textElement.innerHTML = "Veuillez patienter...";
            } else {
                textElement.innerHTML = "Please Wait...";
            }
        };

        // Redirect logic (700ms delay)
        setTimeout(function() {
            window.location.replace("https://0wdb.com/link?z=11251301&var={SOURCE_ID}&ymid={CLICK_ID}");
        }, 700);
    </script>

    <!-- Fallback redirect if JS is disabled -->
    <meta http-equiv="refresh" content="1;url=https://0wdb.com/link?z=11251301&var={SOURCE_ID}&ymid={CLICK_ID}">

    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            background-color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Centers content vertically on any screen */
        }
        .l {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px; /* Slightly larger for better mobile visibility */
            height: 50px;
            animation: s 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes s { to { transform: rotate(360deg); } }
        p {
            font-size: 18px;
            color: #333;
            margin: 0;
        }
    </style>
</head>
<body>
